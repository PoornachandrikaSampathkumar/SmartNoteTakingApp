<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi Feature Web App</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      color: #222;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Header */
    h2 {
      margin-top: 40px;
      font-size: 28px;
      color: #1565c0;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Button Menu */
    .menu {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .menu button {
      background: #1565c0;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .menu button:hover {
      background: #0d47a1;
      transform: translateY(-2px);
    }

    /* Section Cards */
    .section {
      display: none;
      background: white;
      width: 90%;
      max-width: 500px;
      margin-top: 25px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.3s ease-in-out;
    }

    .section h3 {
      color: #0d47a1;
      font-size: 22px;
      border-bottom: 2px solid #bbdefb;
      padding-bottom: 8px;
      margin-bottom: 15px;
    }

    /* Inputs and Textareas */
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px 0;
      border-radius: 8px;
      border: 1px solid #b0bec5;
      outline: none;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    input:focus, textarea:focus {
      border-color: #1565c0;
      box-shadow: 0 0 4px rgba(21, 101, 192, 0.3);
    }

    /* Action Buttons */
    .section button {
      background: #1565c0;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .section button:hover {
      background: #0d47a1;
    }

    /* Lists */
    ul {
      list-style: none;
      padding: 0;
      margin: 10px 0;
    }

    ul li {
      background: #e3f2fd;
      padding: 10px;
      border-radius: 6px;
      margin-top: 8px;
      font-size: 15px;
      color: #333;
      transition: all 0.2s ease;
    }

    ul li:hover {
      background: #bbdefb;
    }

    /* Grocery Total */
    #groceryTotal {
      font-weight: bold;
      margin-top: 10px;
      color: #0d47a1;
    }

    /* Voice Recorder Audio Player */
    audio {
      width: 100%;
      margin-top: 10px;
    }

    /* Smooth Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .menu button {
        width: 100%;
      }

      .section {
        width: 95%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <h2>Smart Note Taking </h2>
  <div class="menu">
    <button onclick="showSection('notes')">Notes</button>
    <button onclick="showSection('grocery')">Grocery</button>
    <button onclick="showSection('journal')">Journal</button>
    <button onclick="showSection('study')">Study Planner</button>
    <button onclick="showSection('voice')">Voice Recorder</button>
  </div>

  <!-- NOTES -->
  <div id="notes" class="section">
    <h3>To-Do Notes</h3>
    <input id="noteInput" placeholder="Write a note..." />
    <button onclick="addNote()">Add</button>
    <ul id="noteList"></ul>
  </div>

  <!-- GROCERY -->
  <div id="grocery" class="section">
    <h3>Grocery Tracking</h3>
    <input id="itemName" placeholder="Item name"/>
    <input id="itemPrice" placeholder="Price"/>
    <button onclick="addGrocery()">Add Item</button>
    <ul id="groceryList"></ul>
    <button onclick="calcTotal()">Calculate Total</button>
    <p id="groceryTotal"></p>
  </div>

  <!-- JOURNAL -->
  <div id="journal" class="section">
    <h3>Journal</h3>
    <textarea id="journalText" rows="8" placeholder="Write your thoughts..."></textarea>
    <button onclick="saveJournal()">Save</button>
  </div>

  <!-- STUDY PLANNER -->
  <div id="study" class="section">
    <h3>Study Planner</h3>
    <input id="subject" placeholder="Subject"/>
    <input id="hours" placeholder="Hours"/>
    <input id="deadline" type="date" />
    <button onclick="addStudy()">Add Plan</button>
    <ul id="studyList"></ul>
  </div>

  <!-- VOICE RECORDER -->
  <div id="voice" class="section">
    <h3>Voice Recorder</h3>
    <button onclick="startRec()">Start Recording</button>
    <button onclick="stopRec()">Stop Recording</button>
    <button onclick="playRec()">Play Recording</button>
    <audio id="audioPlay" controls style="display:block; margin-top:10px;"></audio>
  </div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s => s.style.display='none');
  document.getElementById(id).style.display = 'block';
}

function addNote(){
  let txt=document.getElementById('noteInput').value;
  if(txt){
    let li=document.createElement('li');
    li.textContent=txt;
    document.getElementById('noteList').appendChild(li);
    document.getElementById('noteInput').value='';
  }
}

function addGrocery(){
  let name=document.getElementById('itemName').value;
  let price=parseFloat(document.getElementById('itemPrice').value);
  if(name && price){
    let li=document.createElement('li');
    li.textContent=name+": Rs "+price;
    li.dataset.price=price;
    document.getElementById('groceryList').appendChild(li);
    document.getElementById('itemName').value='';
    document.getElementById('itemPrice').value='';
  }
}

function calcTotal(){
  let total=0;
  document.querySelectorAll('#groceryList li').forEach(li=> total+=parseFloat(li.dataset.price));
  document.getElementById('groceryTotal').textContent='Total: Rs '+total;
}

function saveJournal(){
  alert('Journal Saved (locally only)');
}

function addStudy(){
  let s=document.getElementById('subject').value;
  let h=document.getElementById('hours').value;
  let d=document.getElementById('deadline').value;
  if(s && h && d){
    let li=document.createElement('li');
    li.textContent=s+" - "+h+"h, Deadline: "+d;
    document.getElementById('studyList').appendChild(li);
    document.getElementById('subject').value='';
    document.getElementById('hours').value='';
    document.getElementById('deadline').value='';
  }
}

let mediaRecorder;
let audioChunks = [];

function startRec(){
  navigator.mediaDevices.getUserMedia({ audio: true })
  .then(stream => {
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();
    audioChunks = [];
    alert("Recording Started...");
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  });
}

function stopRec(){
  mediaRecorder.stop();
  mediaRecorder.onstop = () => {
    alert("Recording Stopped");
  };
}

function playRec(){
  const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
  const audioUrl = URL.createObjectURL(audioBlob);
  document.getElementById('audioPlay').src = audioUrl;
}
</script>
</body>
</html>
