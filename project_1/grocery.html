<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grocery Tracking</title>
  <style>
      .section {
      background: white;
      width: 90%;
      max-width: 500px;
      margin-top: 25px;
      padding: 25px;
      border-radius: 12px;
    }

    .section h3 {
      color: navy;
      font-size: 22px;
      border-bottom: 2px solid lightblue;
      padding-bottom: 8px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px 0;
      border-radius: 8px;
      border: 1px solid lightgray;
      outline: none;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: royalblue;
      box-shadow: 0 0 4px rgba(65, 105, 225, 0.3);
    }

     button {
      background: #1565c0;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
    }


    

    ul li {
      background: aliceblue;
      padding: 10px;
      border-radius: 6px;
      margin-top: 8px;
      font-size: 15px;
      color: #333;
      transition: all 0.2s ease;
    }

    #groceryTotal {
      font-weight: bold;
      margin-top: 10px;
      color: navy;
    }
  </style>
</head>
<body>
  <h2>Grocery Tracking</h2>

  <div class="section">
    <h3>Add Grocery Items</h3>
    <input id="itemName" placeholder="Item name" />
    <input id="itemPrice" placeholder="Price" />
    <button onclick="addGrocery()">Add Item</button>

    <ul id="groceryList"></ul>

    <button onclick="calcTotal()">Calculate Total</button>
    <p id="groceryTotal"></p>
  </div>

  <script>
    function addGrocery(){
      let name = document.getElementById('itemName').value;
      let price = parseFloat(document.getElementById('itemPrice').value);

      if(name && price){
        let li = document.createElement('li');
        li.textContent = name + ": Rs " + price;
        li.dataset.price = price;
        document.getElementById('groceryList').appendChild(li);

        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
      }
    }

    function calcTotal(){
      let total = 0;
      document.querySelectorAll('#groceryList li').forEach(li => {
        total += parseFloat(li.dataset.price);
      });
      document.getElementById('groceryTotal').textContent = 'Total: Rs ' + total;
    }
  </script>
</body>
</html>
